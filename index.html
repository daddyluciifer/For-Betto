<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #ffe6f0;
      padding-top: 100px;
      overflow: hidden;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      position: absolute;
    }

    #yes, #yes2 {
      background: #ff4d88;
      color: white;
      left: 45%;
      top: 60%;
    }

    #no, #no2 {
      background: #ccc;
      left: 55%;
      top: 60%;
    }

    .heart {
      position: fixed;
      font-size: 20px;
      animation: floatUp 2s linear forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-200px); opacity: 0; }
    }
  </style>
</head>
<body>

<h2>Do you love me? ❤️</h2>

<button id="yes" onclick="yesClick()">Yes 💕</button>
<button id="no">No 😒</button>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const sound = document.getElementById("sound");

function moveButton(btn) {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

const noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover", () => moveButton(noBtn));
noBtn.addEventListener("click", () => moveButton(noBtn));

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.top = window.innerHeight + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 2000);
}

function yesClick() {
  sound.play();

  for (let i = 0; i < 20; i++) {
    setTimeout(createHeart, i * 100);
  }

  setTimeout(() => {
    document.body.innerHTML = `
      <h2>Will you stay with me forever? </h2>
      <button id="yes2">Yes </button>
      <button id="no2">No </button>
    `;

    const no2 = document.getElementById("no2");
    const yes2 = document.getElementById("yes2");

    no2.style.position = "absolute";
    yes2.style.position = "absolute";

    no2.style.left = "55%";
    no2.style.top = "60%";
    yes2.style.left = "45%";
    yes2.style.top = "60%";

    no2.addEventListener("mouseover", () => moveButton(no2));
    no2.addEventListener("click", () => moveButton(no2));

    yes2.onclick = finalMessage;

  }, 1500);
}

function finalMessage() {
  document.body.innerHTML = `
    <h2>❤️ For You ❤️</h2>
    <p style="font-size:20px; padding:20px;">
    Out of everyone in the world… somehow I ended up with you, ya Albatul.  
    And yeah, I’m not letting go 🫂.   
    <br><br>
    – Yours, always.
    </p>
  `;
}
</script>

</body>
</html>
